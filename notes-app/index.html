<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>

  <!-- Link to our external CSS files -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dark.css" />
</head>
<body>

  <!-- ════════════════════════════════
       TOP NAVIGATION BAR
  ════════════════════════════════ -->
  <header class="navbar">
    <div class="navbar__brand">
      <!-- App icon + name -->
      <span class="navbar__icon">📝</span>
      <span class="navbar__title">Notely</span>
    </div>

    <div class="navbar__actions">
      <!-- Search bar -->
      <div class="search-box">
        <span class="search-box__icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          class="search-box__input"
          placeholder="Search notes…"
          autocomplete="off"
        />
        <!-- Clear search button (hidden by default) -->
        <button id="clearSearch" class="search-box__clear" title="Clear search">✕</button>
      </div>

      <!-- Dark mode toggle button -->
      <button id="darkToggle" class="icon-btn" title="Toggle dark mode">
        <span id="darkIcon">🌙</span>
      </button>
    </div>
  </header>


  <!-- ════════════════════════════════
       SIDEBAR (categories / tags)
  ════════════════════════════════ -->
  <div class="layout">

    <aside class="sidebar">
      <p class="sidebar__heading">Categories</p>
      <ul class="sidebar__list" id="categoryList">
        <!-- Category items are injected by JS (categories.js) -->
      </ul>

      <hr class="sidebar__divider" />

      <p class="sidebar__heading">Quick stats</p>
      <div class="sidebar__stats" id="sidebarStats">
        <!-- Stats injected by JS -->
      </div>
    </aside>


    <!-- ════════════════════════════════
         MAIN CONTENT AREA
    ════════════════════════════════ -->
    <main class="main">

      <!-- ── Toolbar: filter bar + New Note button ── -->
      <div class="toolbar">
        <div class="filter-tabs" id="filterTabs">
          <!-- Tab buttons injected by JS -->
        </div>
        <button id="newNoteBtn" class="btn btn--primary">+ New note</button>
      </div>


      <!-- ── ADD / EDIT NOTE FORM (hidden by default) ── -->
      <div class="note-form-overlay" id="noteFormOverlay">
        <div class="note-form" id="noteForm">

          <div class="note-form__header">
            <h2 class="note-form__title" id="formTitle">New note</h2>
            <button class="icon-btn" id="closeFormBtn" title="Close">✕</button>
          </div>

          <!-- Title field -->
          <input
            type="text"
            id="noteTitleInput"
            class="note-form__field"
            placeholder="Note title…"
            maxlength="100"
          />

          <!-- Body / description field -->
          <textarea
            id="noteBodyInput"
            class="note-form__field note-form__textarea"
            placeholder="Write your note here…"
            rows="6"
          ></textarea>

          <!-- Category selector -->
          <div class="note-form__row">
            <label class="note-form__label">Category</label>
            <select id="noteCategoryInput" class="note-form__select">
              <!-- Options injected by categories.js -->
            </select>
          </div>

          <!-- Color picker row -->
          <div class="note-form__row">
            <label class="note-form__label">Color</label>
            <div class="color-picker" id="colorPicker">
              <!-- Color swatches injected by notes.js -->
            </div>
          </div>

          <!-- Form action buttons -->
          <div class="note-form__actions">
            <button class="btn btn--ghost" id="cancelFormBtn">Cancel</button>
            <button class="btn btn--primary" id="saveNoteBtn">Save note</button>
          </div>

        </div>
      </div>


      <!-- ── NOTES GRID ── -->
      <div class="notes-grid" id="notesGrid">
        <!-- Note cards are injected by JS (notes.js) -->
      </div>

      <!-- Empty state message -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <span class="empty-state__icon">🗒️</span>
        <p class="empty-state__text">No notes yet. Hit <strong>+ New note</strong> to start!</p>
      </div>

    </main>
  </div><!-- /.layout -->


  <!-- ════════════════════════════════
       JAVASCRIPT (order matters!)
  ════════════════════════════════ -->
  <script src="js/storage.js"></script>      <!-- localStorage helpers -->
  <script src="js/categories.js"></script>   <!-- category data & rendering -->
  <script src="js/notes.js"></script>        <!-- note CRUD & rendering -->
  <script src="js/search.js"></script>       <!-- search / filter logic -->
  <script src="js/darkmode.js"></script>     <!-- dark mode toggle -->
  <script src="js/app.js"></script>          <!-- app entry point (init) -->

</body>
</html>
